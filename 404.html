<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Manoj Sharvesh M</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0b09;
    --text: #e8e0d4;
    --muted: #8a7e6e;
    --accent: #d4763a;
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 40px;
  }
  h1 {
    font-family: var(--serif);
    font-size: 6rem;
    color: var(--accent);
    font-weight: 400;
    line-height: 1;
  }
  p { color: var(--muted); margin: 16px 0 32px; font-size: 1.1rem; }
  a {
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    padding: 14px 32px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: background 0.2s;
  }
  a:hover { background: #e8914f; }
</style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>This page doesn't exist. But the homepage does.</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
